<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen active">
    <div class="login-box">
      <h1>Bitácora de Merma</h1>
      <h2>BURGER KING</h2>
      <p class="location">Las Rastras</p>
      
      <form onsubmit="login(event)">
        <input type="email" id="email" placeholder="Correo electrónico" autocomplete="email" required>
        <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" required>
        <button type="submit" class="btn-primary">Ingresar</button>
      </form>
      
      <p id="loginError" class="error" style="display:none;"></p>
      <p class="forgot-link" onclick="mostrarRecuperacion()">¿Olvidaste tu contraseña?</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="screen">
    <div class="container">
      <header>
        <div class="header-top">
          <h1>Bitácora de Merma</h1>
          <button onclick="logout()" class="btn-logout">Cerrar Sesión</button>
        </div>
        <h2>BURGER KING - Las Rastras</h2>
        <p id="userInfo" class="user-info"></p>
      </header>
      
      <!-- Aquí va el resto de tu contenido (tabla, formulario de mermas, etc.) -->
      <!-- ... (mantén el resto igual) ... -->
    </div>
  </div>

  <!-- Modal Recuperación -->
  <div id="recoveryModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Recuperar Contraseña</h3>
      <input type="email" id="recoveryEmail" placeholder="Tu correo electrónico">
      <button onclick="enviarRecuperacion()">Enviar enlace</button>
      <p id="recoveryMessage" style="display:none;"></p>
      <button onclick="cerrarRecuperacion()">Cerrar</button>
    </div>
